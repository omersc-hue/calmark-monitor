name: Calmark Monitor

on:
  schedule:
    # רץ כל 5 דקות (זה המינימום של GitHub Actions)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # מאפשר הרצה ידנית מהממשק

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python calmark_bot.py
